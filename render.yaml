services:
  # The Node.js WebSocket Backend
  - type: web
    name: suraksha-kawach-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: parenguard-backend

  # The Parent Dashboard App
  - type: web
    name: suraksha-kawach-parent
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: parenguard
    envVars:
      - key: VITE_BACKEND_HOST
        fromService:
          type: web
          name: suraksha-kawach-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # The Child App
  - type: web
    name: suraksha-kawach-child
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: child-device-app
    envVars:
      - key: VITE_BACKEND_HOST
        fromService:
          type: web
          name: suraksha-kawach-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
